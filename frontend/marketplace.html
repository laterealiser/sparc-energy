<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Carbon Marketplace — Sparc Energy</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .market-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; height: calc(100vh - 140px); margin-top: 100px; }
    .market-col { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
    .col-header { padding: 16px; border-bottom: 1px solid var(--border-color); font-weight: 700; font-size: 14px; text-transform: uppercase; color: var(--text-muted); }
    .order-book-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 8px 16px; font-size: 12px; }
    .order-book-row.ask { color: var(--sparc-red); }
    .order-book-row.bid { color: var(--sparc-green); }
    .trade-row { display: grid; grid-template-columns: 1fr 1fr; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  </style>
</head>
<body>
<nav class="nav">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">Sparc Energy</span>
    </a>
    <div class="nav-links">
      <a href="marketplace.html" class="nav-link active">Marketplace</a>
      <a href="projects.html" class="nav-link">Projects</a>
      <a href="dashboard.html" class="nav-link">Portfolio</a>
      <div id="nav-auth-user" style="display:flex;gap:12px;align-items:center;">
        <span class="balance-pill" id="nav-balance">$0.00</span>
        <button class="btn btn-secondary" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid" style="padding: 0 40px;">
  <div class="market-layout">
    
    <!-- LEFT: Order Book -->
    <aside class="market-col">
      <div class="col-header">Order Book</div>
      <div style="padding:10px 16px;font-size:11px;color:var(--text-muted);display:grid;grid-template-columns:1fr 1fr 1fr;">
        <span>Price ($)</span><span>Qty (T)</span><span>Total ($)</span>
      </div>
      <div id="asks" style="display:flex;flex-direction:column-reverse;gap:2px;">
        <!-- Sellers (Asks) -->
      </div>
      <div style="text-align:center;padding:12px;font-size:18px;font-weight:700;background:rgba(255,255,255,0.02);">
        $24.50 <span style="font-size:12px;color:var(--sparc-green);">+5.4%</span>
      </div>
      <div id="bids">
        <!-- Buyers (Bids) -->
      </div>
    </aside>

    <!-- CENTER: Charts & Listing Detail -->
    <main class="market-col" style="background:transparent;border:none;">
      <div class="market-col" style="flex:1;margin-bottom:20px;">
        <div class="col-header">Market Chart — VCS Forestry 2024</div>
        <div style="flex:1;padding:20px;">
           <canvas id="marketChart"></canvas>
        </div>
      </div>
      <div class="market-col" style="height:350px;background:var(--bg-secondary);padding:32px;">
        <h2 style="font-size:20px;margin-bottom:20px;">Place Market Order</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
          <div class="form-group">
            <label class="form-label">Price Per Ton ($)</label>
            <input type="number" class="form-input" id="orderPrice" value="24.50" />
          </div>
          <div class="form-group">
            <label class="form-label">Quantity (Tons)</label>
            <input type="number" class="form-input" id="orderQty" placeholder="0.00" />
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:24px;">
          <button class="btn btn-primary flex-1" style="background:var(--sparc-green);line-height:1.2;" onclick="placeOrder('bid')">BUY <br><span style="font-size:10px;font-weight:400;">Bidding Order</span></button>
          <button class="btn btn-primary flex-1" style="background:var(--sparc-red);line-height:1.2;" onclick="placeOrder('ask')">SELL <br><span style="font-size:10px;font-weight:400;">Asking Order</span></button>
        </div>
      </div>
    </main>

    <!-- RIGHT: Recent Trades -->
    <aside class="market-col">
      <div class="col-header">Market Trades</div>
      <div id="recentTrades" style="flex:1;overflow-y:auto;">
        <div class="trade-row">
           <span style="font-size:12px;color:var(--sparc-green);">14:50:22</span>
           <span style="font-size:13px;font-weight:600;text-align:right;">12.4 T @ $24.20</span>
        </div>
      </div>
    </aside>

  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Initialize Chart
  const ctx = document.getElementById('marketChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['10am','11am','12pm','1pm','2pm','3pm','4pm','5pm'],
      datasets: [{
        label: 'VCS Carbon Credits',
        data: [22, 23.5, 23.2, 24.1, 23.8, 24.5, 24.8, 24.5],
        borderColor: '#10b981',
        tension: 0.4,
        fill: true,
        backgroundColor: 'rgba(16,185,129,0.1)'
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });

  async function placeOrder(type) {
    const price = document.getElementById('orderPrice').value;
    const qty = document.getElementById('orderQty').value;
    
    // Check KYC before allowing trade
    const user = await api('/auth/me');
    if (user.data.kyc_status !== 'verified') {
      alert('Verification required. Redirecting to KYC panel...');
      location.href = 'kyc.html';
      return;
    }

    const res = await api('/credits/order', {
      method: 'POST',
      body: JSON.stringify({
        credit_id: 'default_credit_id',
        order_type: type,
        price: parseFloat(price),
        quantity: parseFloat(qty)
      })
    });
    
    if (res.success) {
      alert('Order placed on the registry book!');
    }
  }

  // Subscribe to Real-time updates via Supabase
  subscribeToMarket();
</script>
</body>
</html>
