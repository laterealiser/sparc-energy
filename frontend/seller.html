<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Dashboard — Sparc Energy</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .grid-dashboard { display: grid; grid-template-columns: 240px 1fr; gap: 40px; }
    .sidebar { position: sticky; top: 120px; }
    .side-nav { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .side-link { padding: 12px 16px; border-radius: 12px; transition: all 0.2s; cursor: pointer; color: var(--text-secondary); font-size: 14px; }
    .side-link:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .side-link.active { background: var(--sparc-green); color: white; font-weight: 600; }
    .stat-card { background: var(--bg-secondary); padding: 24px; border-radius: 16px; border: 1px solid var(--border-color); }
  </style>
</head>
<body>
<nav class="nav">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">Sparc Energy</span>
    </a>
    <div class="nav-links">
      <div class="nav-auth-user" id="nav-auth-user" style="display:flex;align-items:center;gap:12px;">
        <span id="nav-balance" class="balance-pill">$0.00</span>
        <button class="btn btn-secondary" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </div>
</nav>

<div class="container" style="margin-top:120px;">
  <div class="grid-dashboard">
    <aside class="sidebar">
      <ul class="side-nav">
        <li class="side-link active" onclick="showPanel('overview')">📊 Overview</li>
        <li class="side-link" onclick="showPanel('projects')">🌿 My Projects</li>
        <li class="side-link" onclick="showPanel('issuance')">📜 Credit Issuance</li>
        <li class="side-link" onclick="showPanel('sales')">💰 Sales Reports</li>
      </ul>
    </aside>

    <main class="content-panel">
      <!-- 1. OVERVIEW PANEL -->
      <section id="panel-overview" class="panel-section active">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px;">
          <div class="stat-card">
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">TOTAL REVENUE</div>
            <div style="font-size:28px;font-weight:700;">$0.00</div>
            <div style="font-size:12px;color:var(--sparc-green);margin-top:4px;">↑ 0.0% this month</div>
          </div>
          <div class="stat-card">
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">CREDITS SOLD</div>
            <div style="font-size:28px;font-weight:700;">0.00 <span style="font-size:14px;font-weight:400;color:var(--text-muted);">Tons</span></div>
          </div>
          <div class="stat-card">
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">ACTIVE PROJECTS</div>
            <div style="font-size:28px;font-weight:700;">0</div>
          </div>
        </div>

        <div class="card-grid" style="margin-top:40px;">
          <div class="auth-card" style="padding:32px;">
            <h2 style="font-size:20px;margin-bottom:24px;">Quick Actions</h2>
            <div style="display:flex;gap:12px;">
              <button class="btn btn-primary" onclick="showPanel('projects')">+ New Project</button>
              <button class="btn btn-secondary" onclick="showPanel('issuance')">📜 Issue Credits</button>
            </div>
          </div>
        </div>
      </section>

      <!-- 2. PROJECTS PANEL -->
      <section id="panel-projects" class="panel-section" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <h2 style="font-size:24px;">Project Registry</h2>
          <button class="btn btn-primary" onclick="openModal('newProjectModal')">+ Submit Project</button>
        </div>
        <div id="projectList" style="display:grid;gap:16px;">
          <div class="stat-card" style="text-align:center;padding:60px;">
            <p>No projects submitted yet.</p>
          </div>
        </div>
      </section>

      <!-- PANELS 3 & 4: Placeholders for now -->
      <section id="panel-issuance" class="panel-section" style="display:none;"><h2>Credit Issuance</h2></section>
      <section id="panel-sales" class="panel-section" style="display:none;"><h2>Sales Reports</h2></section>
    </main>
  </div>
</div>

<!-- Modal: New Project Registration (Complex Form) -->
<div class="modal-overlay" id="newProjectModal">
  <div class="auth-card" style="max-width:700px;width:95%;margin:60px auto;">
    <h2 style="font-size:24px;margin-bottom:30px;">Submit Project Details</h2>
    <form id="projectForm" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div class="form-group" style="grid-column: span 2;">
        <label class="form-label">Project Name</label>
        <input type="text" class="form-input" id="pName" required />
      </div>
      <div class="form-group">
        <label class="form-label">Project Type</label>
        <select class="form-select" id="pType">
          <option value="reforestation">🌳 Reforestation / Forestry</option>
          <option value="solar">☀️ Solar / Renewable Energy</option>
          <option value="wind">🌬️ Wind Energy</option>
          <option value="methane">🔥 Methane Capture</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Certification Standard</label>
        <select class="form-select" id="pCert">
          <option value="Verra VCS">Verra VCS</option>
          <option value="Gold Standard">Gold Standard</option>
          <option value="CDM">CDM (UN)</option>
        </select>
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label class="form-label">Description</label>
        <textarea class="form-input" id="pDesc" rows="4"></textarea>
      </div>
      <div style="grid-column: span 2; display:flex; gap:12px; margin-top:20px;">
        <button type="submit" class="btn btn-primary flex-1">Register Project →</button>
        <button type="button" class="btn btn-secondary flex-1" onclick="closeModal('newProjectModal')">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  function showPanel(id) {
    document.querySelectorAll('.panel-section').forEach(el => el.style.display = 'none');
    document.getElementById(`panel-${id}`).style.display = 'block';
    document.querySelectorAll('.side-link').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // Initial load
  (async function init() {
    // Check if user is seller
    const { data: { user } } = await supabase.auth.getUser();
    if (!user || user.user_metadata.role !== 'seller') {
      alert('Restricted to Project Sellers only.');
      location.href = 'index.html';
    }
  })();
</script>
</body>
</html>
