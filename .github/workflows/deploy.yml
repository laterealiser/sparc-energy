name: Deploy Sparc Energy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Static Site
        # Create a clean _site folder with only frontend assets
        run: |
          mkdir _site
          cp *.html _site/
          cp -r css/ _site/
          cp -r js/ _site/

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Only upload the isolated frontend folder
          path: './_site/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
